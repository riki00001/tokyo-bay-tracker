name: 東京湾釣果データ自動更新v2

on:
  schedule:
    - cron: '0 21 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests beautifulsoup4 lxml

      - run: python scraper.py

      - name: GitHub APIでファイル更新
        run: |
          python - << 'PYEOF'
          import json, base64, urllib.request, os

          token = os.environ["GITHUB_TOKEN"]
          repo  = os.environ["GITHUB_REPOSITORY"]
          url = f"https://api.github.com/repos/{repo}/contents/data/comments.json"

          req = urllib.request.Request(url, headers={
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json"
          })
          try:
              with urllib.request.urlopen(req) as r:
                  sha = json.loads(r.read()).get("sha", "")
          except:
              sha = ""

          with open("data/comments.json", "rb") as f:
              content = base64.b64encode(f.read()).decode()

          import datetime
          now = datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=9)))
          msg = f"🐟 釣果データ自動更新 {now.strftime('%Y-%m-%d %H:%M JST')}"

          data = json.dumps({"message": msg, "content": content, "sha": sha}).encode()
          req2 = urllib.request.Request(url, data=data, method="PUT", headers={
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
              "Content-Type": "application/json"
          })
          with urllib.request.urlopen(req2) as r:
              print("✅ 更新成功:", r.status)
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
